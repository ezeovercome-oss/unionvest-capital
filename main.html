<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnionVest Capital | Premium Investment Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--gold:#d4af37;--gold-light:#f0d878;--bg-dark:#0a0a0f;--bg-card:#111118;--bg-elevated:#1a1a24;--text-primary:#fff;--text-secondary:#a0a0b0;--text-muted:#606070;--border:#2a2a3a;--success:#00d084;--danger:#ff4757;--warning:#ffa502;--info:#3498db}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text-primary);min-height:100vh}
.hidden{display:none!important}
.navbar{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.navbar-brand{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:800;color:var(--gold);text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 12px;border-radius:8px;color:var(--text-secondary);text-decoration:none;font-size:0.8rem;font-weight:500;cursor:pointer;border:none;background:none;transition:all 0.2s}
.nav-link:hover,.nav-link.active{color:var(--gold);background:rgba(212,175,55,0.1)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;padding:10px 20px;border-radius:10px;font-weight:700;font-size:0.85rem;cursor:pointer}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-danger{background:var(--danger);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer}
.page{padding:88px 16px 40px;max-width:1200px;margin:0 auto;min-height:100vh}
.page-header{margin-bottom:24px}
.page-header h1{font-size:1.5rem;margin-bottom:4px}
.page-header p{color:var(--text-secondary);font-size:0.85rem}
.landing-hero{padding:120px 20px 60px;text-align:center;max-width:800px;margin:0 auto}
.landing-hero h1{font-size:2.8rem;font-weight:800;line-height:1.1;margin-bottom:16px;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing-hero p{font-size:1rem;color:var(--text-secondary);margin-bottom:28px;line-height:1.6}
.landing-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;padding:50px 16px;max-width:1000px;margin:0 auto}
.feature-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;transition:all 0.3s}
.feature-card:hover{transform:translateY(-4px);border-color:var(--gold)}
.feature-icon{width:50px;height:50px;background:rgba(212,175,55,0.1);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--gold);font-size:1.3rem}
.feature-card h3{font-size:1rem;margin-bottom:8px}
.feature-card p{color:var(--text-secondary);font-size:0.85rem;line-height:1.5}
.plans-section{background:var(--bg-card);padding:50px 16px;margin:0 -16px}
.plans-section h2{text-align:center;font-size:1.6rem;margin-bottom:36px}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;max-width:800px;margin:0 auto}
.plan-card{background:var(--bg-dark);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;position:relative;transition:all 0.3s}
.plan-card.featured{border-color:var(--gold);box-shadow:0 4px 20px rgba(212,175,55,0.15)}
.plan-card.featured::after{content:'POPULAR';position:absolute;top:10px;right:-22px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;font-size:0.6rem;font-weight:800;padding:3px 26px;transform:rotate(45deg)}
.plan-name{font-size:1rem;font-weight:700;margin-bottom:6px}
.plan-roi{font-size:2rem;font-weight:800;color:var(--gold);margin-bottom:4px}
.plan-roi span{font-size:0.85rem;color:var(--text-secondary)}
.plan-duration{color:var(--text-secondary);font-size:0.8rem;margin-bottom:14px}
.plan-features{list-style:none;margin-bottom:16px;font-size:0.8rem;color:var(--text-secondary)}
.plan-features li{padding:5px 0;border-bottom:1px solid var(--border)}
.plan-features li:last-child{border-bottom:none}
.plan-features li i{color:var(--success);margin-right:6px}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px}
.auth-container{width:100%;max-width:380px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:36px 28px}
.auth-header{text-align:center;margin-bottom:28px}
.auth-header h1{color:var(--gold);font-size:1.5rem;margin-bottom:6px}
.auth-header p{color:var(--text-secondary);font-size:0.85rem}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:0.8rem;font-weight:500;color:var(--text-secondary)}
.form-group input,.form-group select{width:100%;padding:12px 14px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-size:0.9rem}
.form-group input:focus{outline:none;border-color:var(--gold)}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px}
.auth-footer{text-align:center;margin-top:20px;color:var(--text-secondary);font-size:0.85rem}
.auth-footer a{color:var(--gold);text-decoration:none;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(135deg,var(--gold),var(--gold-light))}
.stat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stat-label{font-size:0.8rem;color:var(--text-secondary)}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;background:rgba(212,175,55,0.15);color:var(--gold)}
.stat-value{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.stat-change{font-size:0.8rem;color:var(--success);font-weight:600}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.panel-title{font-size:1rem;font-weight:700}
.panel-action{font-size:0.8rem;color:var(--gold);cursor:pointer;font-weight:600}
.tx-list{display:flex;flex-direction:column;gap:10px}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--bg-elevated);border-radius:12px}
.tx-left{display:flex;align-items:center;gap:12px}
.tx-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.9rem}
.tx-icon.deposit{background:rgba(0,208,132,0.15);color:var(--success)}
.tx-icon.withdraw{background:rgba(255,71,87,0.15);color:var(--danger)}
.tx-icon.invest{background:rgba(212,175,55,0.15);color:var(--gold)}
.tx-icon.referral{background:rgba(52,152,219,0.15);color:var(--info)}
.tx-info h4{font-size:0.9rem;margin-bottom:2px}
.tx-info p{font-size:0.75rem;color:var(--text-secondary)}
.tx-amount{text-align:right}
.tx-amount .amount{font-size:0.95rem;font-weight:700}
.tx-amount .amount.positive{color:var(--success)}
.tx-amount .amount.negative{color:var(--danger)}
.tx-amount .date{font-size:0.75rem;color:var(--text-secondary)}
.investment-plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:24px}
.simulator{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
.simulator h3{margin-bottom:16px}
.simulator-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
.sim-result{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.sim-result-box{background:var(--bg-elevated);border-radius:12px;padding:16px;text-align:center}
.sim-result-box .label{font-size:0.75rem;color:var(--text-secondary);margin-bottom:6px}
.sim-result-box .value{font-size:1.3rem;font-weight:800;color:var(--gold)}
.wallet-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.wallet-tab{padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-weight:600;font-size:0.8rem;cursor:pointer}
.wallet-tab.active{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border-color:var(--gold)}
.wallet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.wallet-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px}
.wallet-header{display:flex;justify-content:space-between;margin-bottom:12px}
.wallet-currency{font-weight:600;display:flex;align-items:center;gap:8px}
.wallet-balance{font-size:1.4rem;font-weight:800;margin-bottom:12px}
.wallet-actions{display:flex;gap:8px}
.wallet-actions button{flex:1;padding:10px;border-radius:10px;font-size:0.8rem;font-weight:600;cursor:pointer;border:none}
.btn-deposit{background:var(--success);color:#fff}
.btn-withdraw{background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border)!important}
.crypto-options{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.crypto-option{padding:10px 16px;background:var(--bg-elevated);border:2px solid var(--border);border-radius:10px;cursor:pointer;font-weight:600;color:var(--text-primary);font-size:0.85rem}
.crypto-option.active{border-color:var(--gold);background:rgba(212,175,55,0.1)}
.qr-section{text-align:center;padding:20px;background:var(--bg-elevated);border-radius:12px}
.qr-placeholder{width:150px;height:150px;background:#fff;border-radius:10px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:#0a0a0f}
.referral-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
.referral-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.referral-icon{width:48px;height:48px;background:rgba(212,175,55,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1.2rem}
.referral-link-box{display:flex;gap:10px;margin-bottom:20px}
.referral-link-box input{flex:1;padding:12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:0.85rem}
.referral-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.referral-stat{text-align:center;padding:14px;background:var(--bg-elevated);border-radius:10px}
.referral-stat-value{font-size:1.2rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.referral-stat-label{font-size:0.75rem;color:var(--text-secondary)}
.progress-bar{height:8px;background:var(--bg-elevated);border-radius:4px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:4px;transition:width 0.5s}
.admin-grid{display:grid;grid-template-columns:180px 1fr;gap:20px}
.admin-sidebar{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:16px;height:fit-content}
.admin-sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:var(--text-secondary);cursor:pointer;font-size:0.85rem;margin-bottom:4px}
.admin-sidebar-item:hover,.admin-sidebar-item.active{background:rgba(212,175,55,0.1);color:var(--gold)}
.data-table{width:100%;border-collapse:collapse}
.data-table th,.data-table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:0.85rem}
.data-table th{font-size:0.75rem;color:var(--text-secondary);text-transform:uppercase}
.status-badge{padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:600}
.status-badge.active{background:rgba(0,208,132,0.15);color:var(--success)}
.status-badge.pending{background:rgba(255,165,2,0.15);color:var(--warning)}
.chatbot-fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:50%;color:#0a0a0f;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 20px rgba(212,175,55,0.3);z-index:998;display:flex;align-items:center;justify-content:center}
.chatbot-panel{position:fixed;bottom:20px;right:20px;width:320px;max-height:450px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;z-index:999;overflow:hidden}
.chatbot-header{padding:14px 18px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;display:flex;justify-content:space-between;align-items:center}
.chatbot-header h3{font-size:0.9rem;display:flex;align-items:center;gap:8px}
.chatbot-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;max-height:280px}
.chat-message{max-width:85%;padding:10px 14px;border-radius:14px;font-size:0.85rem;line-height:1.4}
.chat-message.user{align-self:flex-end;background:var(--gold);color:#0a0a0f;border-bottom-right-radius:4px}
.chat-message.bot{align-self:flex-start;background:var(--bg-elevated);color:var(--text-primary);border-bottom-left-radius:4px}
.chatbot-input{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}
.chatbot-input input{flex:1;padding:10px 14px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:0.85rem}
.chatbot-input button{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:10px;color:#0a0a0f;cursor:pointer;display:flex;align-items:center;justify-content:center}
.toast-container{position:fixed;top:80px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 18px;border-radius:12px;color:#fff;font-weight:600;font-size:0.85rem;box-shadow:0 10px 40px rgba(0,0,0,0.3);animation:slideIn 0.3s ease-out}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--info)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:1.2rem}
.modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.3rem;cursor:pointer}
@media(max-width:768px){.navbar{padding:0 16px}.nav-links{display:none}.landing-hero h1{font-size:2rem}.page{padding:80px 16px 16px}.admin-grid{grid-template-columns:1fr}.chatbot-panel{width:calc(100% - 32px);right:16px}.referral-stats{grid-template-columns:1fr}.investment-plans{grid-template-columns:1fr}.wallet-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
let currentUser=null;
let currentPage='landing';
let chatOpen=false;
let chatMessages=[{type:'bot',text:'Welcome to UnionVest Capital AI Assistant. Ask me about investments, deposits, withdrawals, or referrals.'}];
let walletTab='overview';
let selectedCrypto='BTC';
let adminTab='users';
let simAmount=1000;
let simPlan='premium';
let showInvestModal=false;
let investModalPlan=null;
let toastId=0;

let usersDB = [
  {id:1, name:'John Doe', email:'john@example.com', role:'investor', balance:25400, status:'active', joined:'Jun 15, 2026', lastLogin:'Today'},
  {id:2, name:'Sarah Smith', email:'sarah@example.com', role:'investor', balance:18750, status:'active', joined:'Jun 10, 2026', lastLogin:'Yesterday'},
  {id:3, name:'Mike Johnson', email:'mike@example.com', role:'investor', balance:5200, status:'pending', joined:'Jun 20, 2026', lastLogin:'Today'},
  {id:4, name:'Admin User', email:'admin@unionvest.com', role:'admin', balance:0, status:'active', joined:'Jun 1, 2026', lastLogin:'Today'}
];

let pendingTransactions = [
  {id:101, user:'John Doe', email:'john@example.com', type:'deposit', amount:2500, method:'Bitcoin', status:'pending', date:'Today, 10:23 AM'},
  {id:102, user:'Sarah Smith', email:'sarah@example.com', type:'withdraw', amount:800, method:'Bank Transfer', status:'pending', date:'Today, 9:45 AM'},
  {id:103, user:'Mike Johnson', email:'mike@example.com', type:'deposit', amount:5000, method:'USDT', status:'pending', date:'Jun 16, 2026'}
];

let pendingTxId = 104;


const plans=[
  {id:'starter',name:'Starter',roi:5,duration:7,min:100,max:999,color:'#606070'},
  {id:'growth',name:'Growth',roi:8,duration:14,min:500,max:4999,color:'#3498db'},
  {id:'premium',name:'Premium',roi:12,duration:30,min:1000,max:9999,color:'#d4af37',featured:true},
  {id:'elite',name:'Elite',roi:18,duration:60,min:5000,max:24999,color:'#9b59b6'},
  {id:'vip',name:'VIP',roi:25,duration:90,min:10000,max:100000,color:'#e74c3c'}
];

const wallets=[
  {currency:'USD',balance:25400,symbol:'$',flag:'🇺🇸'},
  {currency:'EUR',balance:18200.50,symbol:'€',flag:'🇪🇺'},
  {currency:'GBP',balance:15600.75,symbol:'£',flag:'🇬🇧'},
  {currency:'BTC',balance:0.42,symbol:'₿',flag:'₿'},
  {currency:'ETH',balance:3.15,symbol:'Ξ',flag:'Ξ'},
  {currency:'USDT',balance:8500,symbol:'₮',flag:'₮'}
];

const cryptoOptions=[
  {name:'Bitcoin',symbol:'BTC',address:'bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh'},
  {name:'Ethereum',symbol:'ETH',address:'0x71C7656EC7ab88b098defB751B7401B5f6d8976F'},
  {name:'USDT',symbol:'USDT',address:'TXYZ1234567890ABCDEFGHIJKLMNOPQRSTUV'},
  {name:'Litecoin',symbol:'LTC',address:'ltc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh'}
];

const botResponses={
  invest:'Our plans range from 5% to 25% ROI. Starter requires $100 minimum, Premium $1,000. Check the Investments page!',
  deposit:'Deposit via Bitcoin, Ethereum, USDT, or bank transfer. Go to Wallet > Deposit.',
  withdraw:'Withdrawals process within 24 hours. Minimum is $50. Go to Wallet > Withdraw.',
  referral:'Earn 10% lifetime commission on every deposit your referrals make! Share your link from the Referrals page.',
  roi:'ROI by plan: Starter 5%, Growth 8%, Premium 12%, Elite 18%, VIP 25%.',
  help:'I can help with: investments, deposits, withdrawals, referrals, and ROI calculations.'
};

function navigate(page){currentPage=page;render()}
function login(user){currentUser=user;localStorage.setItem('uv_user',JSON.stringify(user));addToast('Welcome, '+user.name,'success');navigate('dashboard')}
function logout(){currentUser=null;localStorage.removeItem('uv_user');addToast('Logged out','info');navigate('landing')}
function addToast(message,type='info'){const id=Date.now();toasts.push({id,message,type});render();setTimeout(()=>{toasts=toasts.filter(t=>t.id!==id);render()},4000)}
function sendChat(){const input=document.getElementById('chatInput');if(!input.value.trim())return;const msg=input.value.trim();chatMessages.push({type:'user',text:msg});input.value='';render();setTimeout(()=>{const lower=msg.toLowerCase();let resp=botResponses.help;for(const key in botResponses){if(lower.includes(key)){resp=botResponses[key];break}}chatMessages.push({type:'bot',text:resp});render()},600)}
function handleLogin(){const email=document.getElementById('loginEmail').value;const isAdmin=email.includes('admin')||email.toLowerCase()==='mettystewart08@gmail.com';
login({id:'1',name:isAdmin?'Admin User':'John Investor',email:email,role:isAdmin?'admin':'investor',balance:25400,currency:'USD'})}
function handleRegister(){const name=document.getElementById('regName').value;const email=document.getElementById('regEmail').value;const pass=document.getElementById('regPass').value;const confirm=document.getElementById('regConfirm').value;if(pass!==confirm){addToast('Passwords do not match','error');return}const isAdmin=email.includes('admin');login({id:'1',name:name,email:email,role:isAdmin?'admin':'investor',balance:0,currency:'USD'})}
function openInvestModal(planId){investModalPlan=plans.find(p=>p.id===planId);showInvestModal=true;render()}
function closeInvestModal(){showInvestModal=false;investModalPlan=null;render()}
function confirmInvest(){const amount=document.getElementById('investAmount').value;if(!amount||Number(amount)<investModalPlan.min){addToast('Minimum investment for '+investModalPlan.name+' is $'+investModalPlan.min,'error');return}addToast('Successfully invested $'+Number(amount).toLocaleString()+' in '+investModalPlan.name+' plan!','success');closeInvestModal()}

function submitDeposit(){
  const amount = parseFloat(document.getElementById('depAmount').value);
  const method = document.getElementById('depMethod').value;
  if(!amount || amount < 10){
    addToast('Minimum deposit is $10','error');
    return;
  }
  const fee = method === 'card' ? amount * 0.025 : method === 'paypal' ? amount * 0.03 : 0;
  const total = amount + fee;
  
  const methodNames = {bank:'Bank Transfer',card:'Credit/Debit Card',paypal:'PayPal',crypto:'Cryptocurrency'};
  const newTx = {
    type:'deposit',
    title: method === 'crypto' ? selectedCrypto + ' Deposit' : methodNames[method] + ' Deposit',
    desc: method === 'crypto' ? selectedCrypto + ' Network' : methodNames[method],
    amount: amount,
    date: 'Just now',
    positive: true
  };
  
  const usdWallet = wallets.find(w => w.currency === 'USD');
  if(usdWallet) usdWallet.balance += amount;
  
  addToast('Deposit of $' + amount.toLocaleString() + ' submitted successfully!','success');
  walletTab = 'overview';
  render();
}

function submitWithdrawal(){
  const amount = parseFloat(document.getElementById('wdAmount').value);
  const method = document.getElementById('wdMethod').value;
  const address = document.getElementById('wdAddress').value;
  
  if(!amount || amount < 50){
    addToast('Minimum withdrawal is $50','error');
    return;
  }
  if(!address){
    addToast('Please enter a destination address','error');
    return;
  }
  
  const usdWallet = wallets.find(w => w.currency === 'USD');
  if(!usdWallet || usdWallet.balance < amount){
    addToast('Insufficient balance','error');
    return;
  }
  
  usdWallet.balance -= amount;
  
  const methodNames = {bank:'Bank Transfer',crypto:'Cryptocurrency',paypal:'PayPal'};
  addToast('Withdrawal of $' + amount.toLocaleString() + ' submitted! Processing within 24h.','success');
  walletTab = 'overview';
  render();
}

function adminCreditUser(userId){
  const user = usersDB.find(u => u.id === userId);
  if(!user) return;
  const amount = prompt('Credit amount for ' + user.name + ' ($' + user.balance.toLocaleString() + '):', '100');
  if(!amount || isNaN(amount) || parseFloat(amount) <= 0) return;
  const amt = parseFloat(amount);
  user.balance += amt;
  addToast('Credited $' + amt.toLocaleString() + ' to ' + user.name, 'success');
  render();
}

function adminDebitUser(userId){
  const user = usersDB.find(u => u.id === userId);
  if(!user) return;
  const amount = prompt('Debit amount from ' + user.name + ' ($' + user.balance.toLocaleString() + '):', '100');
  if(!amount || isNaN(amount) || parseFloat(amount) <= 0) return;
  const amt = parseFloat(amount);
  if(amt > user.balance){
    addToast('Insufficient user balance', 'error');
    return;
  }
  user.balance -= amt;
  addToast('Debited $' + amt.toLocaleString() + ' from ' + user.name, 'success');
  render();
}

function adminApproveTx(txId){
  const tx = pendingTransactions.find(t => t.id === txId);
  if(!tx) return;
  const user = usersDB.find(u => u.email === tx.email);
  if(tx.type === 'deposit' && user){
    user.balance += tx.amount;
  }
  tx.status = 'approved';
  addToast('Transaction #' + txId + ' approved', 'success');
  render();
}

function adminRejectTx(txId){
  const tx = pendingTransactions.find(t => t.id === txId);
  if(!tx) return;
  const user = usersDB.find(u => u.email === tx.email);
  if(tx.type === 'withdraw' && user){
    user.balance += tx.amount;
  }
  tx.status = 'rejected';
  addToast('Transaction #' + txId + ' rejected', 'error');
  render();
}
