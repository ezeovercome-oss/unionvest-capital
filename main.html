<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnionVest Capital | Premium Investment Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--gold:#d4af37;--gold-light:#f0d878;--bg:#0a0a0f;--bg-elevated:#12121a;--bg-card:#1a1a24;--border:#2a2a35;--text:#e8e8ec;--text-secondary:#a0a0b0;--text-muted:#6a6a7a;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between}
.navbar-brand{display:flex;align-items:center;gap:10px;color:var(--gold);font-weight:800;font-size:1.3rem;text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 12px;border-radius:8px;color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:500;transition:all 0.2s}
.nav-link:hover,.nav-link.active{color:var(--gold);background:rgba(212,175,55,0.1)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;padding:12px 24px;border-radius:12px;font-weight:700;cursor:pointer;transition:all 0.3s;font-size:0.9rem}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(212,175,55,0.3)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;transition:all 0.3s}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.page{padding:84px 20px 40px;max-width:1200px;margin:0 auto}
.page-header{margin-bottom:28px}
.page-header h1{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.page-header p{color:var(--text-secondary);font-size:0.9rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.3s}
.stat-card:hover{border-color:var(--gold);transform:translateY(-4px)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:12px}
.stat-value{font-size:1.6rem;font-weight:800;margin-bottom:4px}
.stat-label{font-size:0.8rem;color:var(--text-secondary)}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.panel-title{font-size:1.1rem;font-weight:700}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:0.85rem;font-weight:500;color:var(--text-secondary)}
.form-group input,.form-group select{width:100%;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:0.9rem;outline:none;transition:all 0.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.wallet-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.wallet-tab{padding:10px 20px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.wallet-tab.active{background:rgba(212,175,55,0.15);border-color:var(--gold);color:var(--gold)}
.wallet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.wallet-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.3s}
.wallet-card:hover{border-color:var(--gold)}
.wallet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.wallet-currency{display:flex;align-items:center;gap:8px;font-weight:700}
.wallet-balance{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.wallet-actions{display:flex;gap:8px;margin-top:12px}
.btn-deposit{background:var(--success);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer}
.btn-withdraw{background:var(--danger);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer}
.crypto-options{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.crypto-option{padding:12px 20px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);font-weight:600;cursor:pointer;transition:all 0.2s}
.crypto-option.active{background:rgba(212,175,55,0.15);border-color:var(--gold);color:var(--gold)}
.qr-section{text-align:center;padding:20px;background:var(--bg-elevated);border-radius:16px}
.qr-placeholder{width:160px;height:160px;background:#fff;border-radius:12px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.referral-link-box{display:flex;gap:8px;margin-top:12px}
.referral-link-box input{flex:1;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.85rem}
.badge{padding:4px 10px;border-radius:20px;font-size:0.75rem;font-weight:600}
.badge-success{background:rgba(34,197,94,0.15);color:var(--success)}
.badge-warning{background:rgba(245,158,11,0.15);color:var(--warning)}
.toast-container{position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-size:0.85rem;font-weight:500;animation:slideIn 0.3s ease;max-width:320px}
.toast.success{border-color:var(--success);background:rgba(34,197,94,0.1)}
.toast.error{border-color:var(--danger);background:rgba(239,68,68,0.1)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.chat-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px rgba(212,175,55,0.4);z-index:1000}
.chat-window{position:fixed;bottom:90px;right:24px;width:340px;height:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;z-index:1000}
.chat-header{padding:16px 20px;background:var(--bg-elevated);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-bubble{padding:10px 14px;border-radius:12px;max-width:85%;font-size:0.85rem;line-height:1.4}
.chat-bubble.bot{background:var(--bg-elevated);color:var(--text);align-self:flex-start}
.chat-bubble.user{background:var(--gold);color:#0a0a0f;align-self:flex-end}
.chat-input{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.85rem;outline:none}
.landing-hero{text-align:center;padding:120px 20px 80px;background:linear-gradient(180deg,rgba(212,175,55,0.05) 0%,transparent 100%)}
.landing-hero h1{font-size:3rem;font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing-hero p{font-size:1.1rem;color:var(--text-secondary);max-width:600px;margin:0 auto 32px}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;padding:40px 20px;max-width:1200px;margin:0 auto}
.feature-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;transition:all 0.3s}
.feature-card:hover{border-color:var(--gold);transform:translateY(-4px)}
.feature-icon{font-size:2.5rem;color:var(--gold);margin-bottom:16px}
.invest-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:24px;transition:all 0.3s;position:relative;overflow:hidden}
.invest-card:hover{border-color:var(--gold);transform:translateY(-4px)}
.invest-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light))}
.plan-name{font-size:1.2rem;font-weight:700;margin-bottom:8px}
.plan-roi{font-size:2rem;font-weight:800;color:var(--gold);margin-bottom:4px}
.plan-duration{font-size:0.85rem;color:var(--text-secondary);margin-bottom:16px}
.plan-range{font-size:0.8rem;color:var(--text-muted);margin-bottom:16px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-content{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:420px;width:100%}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer}
@media(max-width:768px){.landing-hero h1{font-size:2rem}.page{padding:80px 16px 20px}.chat-window{width:calc(100vw - 32px);height:50vh;right:16px;bottom:80px}.wallet-tabs{gap:6px}.wallet-tab{padding:8px 14px;font-size:0.8rem}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toastContainer"></div>
<button class="chat-fab" id="chatFab" onclick="toggleChat()"><i class="fas fa-robot"></i></button>
<div id="chatWindow" class="chat-window hidden">
<div class="chat-header"><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-robot" style="color:var(--gold)"></i><div><div style="font-weight:700">AI Assistant</div><div style="font-size:0.75rem;color:var(--text-secondary)">Online</div></div></div><button onclick="toggleChat()" style="background:none;border:none;color:var(--text-muted);cursor:pointer"><i class="fas fa-times"></i></button></div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input"><input type="text" id="chatInput" placeholder="Ask about investments..." onkeypress="if(event.key==='Enter')sendChat()"><button class="btn-gold" style="padding:10px 16px" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button></div>
</div>
<script>
let currentUser=null;
let currentPage='landing';
let chatOpen=false;
let chatMessages=[{type:'bot',text:'Welcome to UnionVest Capital AI Assistant. Ask me about investments, deposits, withdrawals, or referrals.'}];
let walletTab='overview';
let selectedCrypto='BTC';
let adminTab='users';
let simAmount=1000;
let simPlan='premium';
let showInvestModal=false;
let investModalPlan=null;
let toastId=0;

let usersDB=[
  {id:1,name:'John Doe',email:'john@example.com',role:'investor',balance:25400,status:'active',joined:'Jun 15, 2026',lastLogin:'Today'},
  {id:2,name:'Sarah Smith',email:'sarah@example.com',role:'investor',balance:18750,status:'active',joined:'Jun 10, 2026',lastLogin:'Yesterday'},
  {id:3,name:'Mike Johnson',email:'mike@example.com',role:'investor',balance:5200,status:'pending',joined:'Jun 20, 2026',lastLogin:'Today'},
  {id:4,name:'Admin User',email:'admin@unionvest.com',role:'admin',balance:0,status:'active',joined:'Jun 1, 2026',lastLogin:'Today'}
];

let pendingTransactions=[
  {id:101,user:'John Doe',email:'john@example.com',type:'deposit',amount:2500,method:'Bitcoin',status:'pending',date:'Today, 10:23 AM'},
  {id:102,user:'Sarah Smith',email:'sarah@example.com',type:'withdraw',amount:800,method:'Bank Transfer',status:'pending',date:'Today, 9:45 AM'},
  {id:103,user:'Mike Johnson',email:'mike@example.com',type:'deposit',amount:5000,method:'USDT',status:'pending',date:'Jun 16, 2026'}
];

let pendingTxId=104;

const wallets=[
  {currency:'USD',symbol:'$',balance:25400,flag:'🇺🇸'},
  {currency:'EUR',symbol:'€',balance:0,flag:'🇪🇺'},
  {currency:'GBP',symbol:'£',balance:0,flag:'🇬🇧'},
  {currency:'BTC',symbol:'₿',balance:0.45,flag:'₿'},
  {currency:'ETH',symbol:'Ξ',balance:2.1,flag:'Ξ'},
  {currency:'USDT',symbol:'₮',balance:5000,flag:'₮'}
];

const cryptoOptions=[
  {symbol:'BTC',name:'Bitcoin',address:'bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh'},
  {symbol:'ETH',name:'Ethereum',address:'0x71C7656EC7ab88b098defB751B7401B5f6d8976F'},
  {symbol:'USDT',name:'Tether (TRC-20)',address:'T9yD14Nj9j7v6hW9gQ8x4zG7fK2mN5pQ8rS3tU6vW9x'}
];

const plans=[
  {id:'starter',name:'Starter',roi:5,duration:7,min:100,max:999,featured:false},
  {id:'growth',name:'Growth',roi:8,duration:14,min:500,max:4999,featured:false},
  {id:'premium',name:'Premium',roi:12,duration:30,min:1000,max:9999,featured:true},
  {id:'elite',name:'Elite',roi:18,duration:60,min:5000,max:24999,featured:false},
  {id:'vip',name:'VIP',roi:25,duration:90,min:10000,max:100000,featured:false}
];

const chatResponses={
  deposit:'To deposit, go to Wallet → Deposit. Choose your payment method (Bank, Card, PayPal, or Crypto). Minimum deposit is $10.',
  withdraw:'To withdraw, go to Wallet → Withdraw. Enter amount (min $50), select method, and provide destination address. Processing takes 24-48 hours.',
  invest:'We offer 5 plans: Starter (5%/7days), Growth (8%/14days), Premium (12%/30days), Elite (18%/60days), VIP (25%/90days). Go to Investments to get started.',
  referral:'Refer friends and earn 10% lifetime commission on their investments. Your referral code is UV-INVESTOR-2026.',
  roi:'ROI by plan: Starter 5%, Growth 8%, Premium 12%, Elite 18%, VIP 25%. Returns are calculated daily and paid at plan maturity.',
  help:'I can help with: investments, deposits, withdrawals, referrals, ROI calculations, and account questions.'
};

function navigate(page){currentPage=page;render()}
function login(user){currentUser=user;localStorage.setItem('uv_user',JSON.stringify(user));render()}
function logout(){currentUser=null;localStorage.removeItem('uv_user');addToast('Logged out','info');navigate('landing')}
function addToast(message,type='info'){const container=document.getElementById('toastContainer');const id=++toastId;const toast=document.createElement('div');toast.className=`toast ${type}`;toast.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':type==='error'?'times-circle':type==='warning'?'exclamation-triangle':'info-circle'}" style="margin-right:8px"></i>${message}`;container.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';toast.style.transform='translateX(100%)';setTimeout(()=>toast.remove(),300)},4000)}
function sendChat(){const input=document.getElementById('chatInput');const msg=input.value.trim();if(!msg)return;chatMessages.push({type:'user',text:msg});const lower=msg.toLowerCase();let reply='I can help with investments, deposits, withdrawals, and referrals. What would you like to know?';for(const[key,val]of Object.entries(chatResponses)){if(lower.includes(key)){reply=val;break}}chatMessages.push({type:'bot',text:reply});input.value='';renderChat()}
function renderChat(){const container=document.getElementById('chatMessages');container.innerHTML=chatMessages.map(m=>`<div class="chat-bubble ${m.type}">${m.text}</div>`).join('');container.scrollTop=container.scrollHeight}
function toggleChat(){chatOpen=!chatOpen;document.getElementById('chatWindow').classList.toggle('hidden',!chatOpen);if(chatOpen)renderChat()}
function handleLogin(){const email=document.getElementById('loginEmail').value;const password=document.getElementById('loginPassword').value;if(!email||!password){addToast('Please fill all fields','error');return}const isAdmin=email.toLowerCase().includes('admin')||email.toLowerCase()==='mettystewart08@gmail.com';const user={id:Date.now(),name:email.split('@')[0],email:email,isAdmin:isAdmin};login(user);addToast('Welcome, '+user.name,'success');navigate('dashboard')}
function handleRegister(){const name=document.getElementById('regName').value;const email=document.getElementById('regEmail').value;const password=document.getElementById('regPassword').value;if(!name||!email||!password){addToast('Please fill all fields','error');return}const isAdmin=email.toLowerCase().includes('admin')||email.toLowerCase()==='mettystewart08@gmail.com';const user={id:Date.now(),name:name,email:email,isAdmin:isAdmin};login(user);addToast('Account created! Welcome, '+name,'success');navigate('dashboard')}
function openInvestModal(planId){investModalPlan=plans.find(p=>p.id===planId);showInvestModal=true;render()}
function closeInvestModal(){showInvestModal=false;investModalPlan=null;render()}
function confirmInvest(){const amount=parseFloat(document.getElementById('investAmount').value);if(!amount||amount<investModalPlan.min||amount>investModalPlan.max){addToast('Amount must be between $'+investModalPlan.min+' and $'+investModalPlan.max,'error');return}addToast('Investment of $'+amount.toLocaleString()+' in '+investModalPlan.name+' plan confirmed!','success');showInvestModal=false;render()}
function copyAddress(addr){navigator.clipboard.writeText(addr).then(()=>addToast('Address copied to clipboard','success'))}
function submitDeposit(){const amount=parseFloat(document.getElementById('depAmount').value);const method=document.getElementById('depMethod').value;if(!amount||amount<10){addToast('Minimum deposit is $10','error');return}const fee=method==='card'?amount*0.025:method==='paypal'?amount*0.03:0;const usdWallet=wallets.find(w=>w.currency==='USD');if(usdWallet)usdWallet.balance+=amount;addToast('Deposit of $'+amount.toLocaleString()+' submitted successfully!','success');walletTab='overview';render()}
function submitWithdrawal(){const amount=parseFloat(document.getElementById('wdAmount').value);const method=document.getElementById('wdMethod').value;const address=document.getElementById('wdAddress').value;if(!amount||amount<50){addToast('Minimum withdrawal is $50','error');return}if(!address){addToast('Please enter a destination address','error');return}const usdWallet=wallets.find(w=>w.currency==='USD');if(!usdWallet||usdWallet.balance<amount){addToast('Insufficient balance','error');return}usdWallet.balance-=amount;addToast('Withdrawal of $'+amount.toLocaleString()+' submitted! Processing within 24h.','success');walletTab='overview';render()}
function adminCreditUser(userId){const user=usersDB.find(u=>u.id===userId);if(!user)return;const amount=prompt('Credit amount for '+user.name+' ($'+user.balance.toLocaleString()+'):','100');if(!amount||isNaN(amount)||parseFloat(amount)<=0)return;const amt=parseFloat(amount);user.balance+=amt;addToast('Credited $'+amt.toLocaleString()+' to '+user.name,'success');render()}
function adminDebitUser(userId){const user=usersDB.find(u=>u.id===userId);if(!user)return;const amount=prompt('Debit amount from '+user.name+' ($'+user.balance.toLocaleString()+'):','100');if(!amount||isNaN(amount)||parseFloat(amount)<=0)return;const amt=parseFloat(amount);if(amt>user.balance){addToast('Insufficient user balance','error');return}user.balance-=amt;addToast('Debited $'+amt.toLocaleString()+' from '+user.name,'success');render()}
function adminApproveTx(txId){const tx=pendingTransactions.find(t=>t.id===txId);if(!tx)return;const user=usersDB.find(u=>u.email===tx.email);if(tx.type==='deposit'&&user)user.balance+=tx.amount;tx.status='approved';addToast('Transaction #'+txId+' approved','success');render()}
function adminRejectTx(txId){const tx=pendingTransactions.find(t=>t.id===txId);if(!tx)return;const user=usersDB.find(u=>u.email===tx.email);if(tx.type==='withdraw'&&user)user.balance+=tx.amount;tx.status='rejected';addToast('Transaction #'+txId+' rejected','error');render()}
function render(){
  const app=document.getElementById('app');
  let content='';
  
  if(currentPage!=='landing'){
    content+=`<nav class="navbar"><a href="#" class="navbar-brand" onclick="navigate('landing')"><i class="fas fa-chart-line"></i>UnionVest Capital</a>`;
    if(currentUser){
      content+=`<div class="nav-links"><a href="#" class="nav-link ${currentPage==='dashboard'?'active':''}" onclick="navigate('dashboard')">Dashboard</a><a href="#" class="nav-link ${currentPage==='investments'?'active':''}" onclick="navigate('investments')">Investments</a><a href="#" class="nav-link ${currentPage==='wallet'?'active':''}" onclick="navigate('wallet')">Wallet</a><a href="#" class="nav-link ${currentPage==='referrals'?'active':''}" onclick="navigate('referrals')">Referrals</a>`;
      if(currentUser.isAdmin){
        content+=`<a href="#" class="nav-link ${currentPage==='admin'?'active':''}" onclick="navigate('admin')">Admin</a>`;
      }
      content+=`</div><div style="display:flex;align-items:center;gap:12px"><span style="font-size:0.85rem;color:var(--text-secondary)">${currentUser.name}</span><button class="btn-outline" style="padding:6px 12px;font-size:0.75rem" onclick="logout()">Logout</button></div>`;
    }else{
      content+=`<div style="display:flex;gap:8px"><button class="btn-outline" style="padding:8px 16px;font-size:0.8rem" onclick="navigate('login')">Sign In</button><button class="btn-gold" style="padding:8px 16px;font-size:0.8rem" onclick="navigate('register')">Get Started</button></div>`;
    }
    content+=`</nav>`;
  }
  
  switch(currentPage){
    case 'landing':content+=renderLanding();break;
    case 'login':content+=renderLogin();break;
    case 'register':content+=renderRegister();break;
    case 'dashboard':content+=renderDashboard();break;
    case 'investments':content+=renderInvestments();break;
    case 'wallet':content+=renderWallet();break;
    case 'referrals':content+=renderReferrals();break;
    case 'admin':content+=renderAdmin();break;
  }
  
  if(showInvestModal&&investModalPlan){

  }
  
  app.innerHTML=content;
  
  if(walletTab==='deposit'){
    const depAmount=document.getElementById('depAmount');
    const depMethod=document.getElementById('depMethod');
    const depSubmit=document.getElementById('depSubmitBtn');
    const depSummary=document.getElementById('depositSummary');
    const cryptoSelect=document.getElementById('cryptoSelect');
    if(depAmount&&depMethod){
      const updateDeposit=()=>{
        const amount=parseFloat(depAmount.value)||0;
        const method=depMethod.value;
        const fee=method==='card'?amount*0.025:method==='paypal'?amount*0.03:0;
        if(cryptoSelect)cryptoSelect.style.display=method==='crypto'?'block':'none';
        if(amount>=10){
          depSubmit.disabled=false;
          depSubmit.style.opacity='1';
          depSummary.style.display='block';
          document.getElementById('depSumAmount').textContent='$'+amount.toLocaleString();
          document.getElementById('depSumMethod').textContent=method.toUpperCase();
          document.getElementById('depSumFee').textContent='$'+fee.toFixed(2);
          document.getElementById('depSumTotal').textContent='$'+(amount+fee).toLocaleString();
        }else{
          depSubmit.disabled=true;
          depSubmit.style.opacity='0.5';
          depSummary.style.display='none';
        }
      };
      depAmount.addEventListener('input',updateDeposit);
      depMethod.addEventListener('change',updateDeposit);
    }
  }
}

  let adminContent='';
  if(adminTab==='users'){
    adminContent=`<div class="panel"><div class="panel-header" style="display:flex;justify-content:space-between;align-items:center"><h3 class="panel-title"><i class="fas fa-users" style="margin-right:10px"></i>User Management</h3></div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1px solid var(--border);text-align:left"><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">User</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Email</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Balance</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Status</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Joined</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Actions</th></tr></thead><tbody>${usersDB.map(u=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:12px"><div style="font-weight:600">${u.name}</div><span class="badge ${u.role==='admin'?'badge-warning':'badge-success'}" style="font-size:0.65rem;margin-top:4px;display:inline-block">${u.role}</span></td><td style="padding:12px;font-size:0.85rem;color:var(--text-secondary)">${u.email}</td><td style="padding:12px;font-weight:700;color:var(--success)">$${u.balance.toLocaleString()}</td><td style="padding:12px"><span class="badge ${u.status==='active'?'badge-success':'badge-warning'}">${u.status}</span></td><td style="padding:12px;font-size:0.8rem;color:var(--text-secondary)">${u.joined}</td><td style="padding:12px"><div style="display:flex;gap:6px"><button class="btn-gold" style="padding:6px 10px;font-size:0.7rem" onclick="adminCreditUser(${u.id})"><i class="fas fa-plus-circle"></i> Credit</button><button class="btn-outline" style="padding:6px 10px;font-size:0.7rem" onclick="adminDebitUser(${u.id})"><i class="fas fa-minus-circle"></i> Debit</button></div></td></tr>`).join('')}</tbody></table></div></div>`;
  }else if(adminTab==='deposits'){
    const pendingDeps=pendingTransactions.filter(t=>t.type==='deposit'&&t.status==='pending');
    adminContent=`<div class="panel"><div class="panel-header"><h3 class="panel-title"><i class="fas fa-arrow-down" style="color:var(--success);margin-right:10px"></i>Pending Deposits</h3></div>${pendingDeps.length===0?'<div style="padding:40px;text-align:center;color:var(--text-secondary)"><i class="fas fa-check-circle" style="font-size:2rem;margin-bottom:12px;display:block"></i>No pending deposits</div>':`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1px solid var(--border);text-align:left"><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">User</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Amount</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Method</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Date</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Actions</th></tr></thead><tbody>${pendingDeps.map(t=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:12px"><div style="font-weight:600">${t.user}</div><div style="font-size:0.75rem;color:var(--text-secondary)">${t.email}</div></td><td style="padding:12px;font-weight:700;color:var(--success)">+$${t.amount.toLocaleString()}</td><td style="padding:12px;font-size:0.85rem">${t.method}</td><td style="padding:12px;font-size:0.8rem;color:var(--text-secondary)">${t.date}</td><td style="padding:12px"><div style="display:flex;gap:6px"><button class="btn-gold" style="padding:6px 12px;font-size:0.75rem" onclick="adminApproveTx(${t.id})"><i class="fas fa-check"></i> Approve</button><button class="btn-outline" style="padding:6px 12px;font-size:0.75rem;color:var(--danger);border-color:var(--danger)" onclick="adminRejectTx(${t.id})"><i class="fas fa-times"></i> Reject</button></div></td></tr>`).join('')}</tbody></table></div>`}</div>`;
  }else if(adminTab==='withdrawals'){
    const pendingWds=pendingTransactions.filter(t=>t.type==='withdraw'&&t.status==='pending');
    adminContent=`<div class="panel"><div class="panel-header"><h3 class="panel-title"><i class="fas fa-arrow-up" style="color:var(--danger);margin-right:10px"></i>Pending Withdrawals</h3></div>${pendingWds.length===0?'<div style="padding:40px;text-align:center;color:var(--text-secondary)"><i class="fas fa-check-circle" style="font-size:2rem;margin-bottom:12px;display:block"></i>No pending withdrawals</div>':`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1px solid var(--border);text-align:left"><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">User</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Amount</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Method</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Date</th><th style="padding:12px;font-size:0.8rem;color:var(--text-secondary);font-weight:600">Actions</th></tr></thead><tbody>${pendingWds.map(t=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:12px"><div style="font-weight:600">${t.user}</div><div style="font-size:0.75rem;color:var(--text-secondary)">${t.email}</div></td><td style="padding:12px;font-weight:700;color:var(--danger)">-$${t.amount.toLocaleString()}</td><td style="padding:12px;font-size:0.85rem">${t.method}</td><td style="padding:12px;font-size:0.8rem;color:var(--text-secondary)">${t.date}</td><td style="padding:12px"><div style="display:flex;gap:6px"><button class="btn-gold" style="padding:6px 12px;font-size:0.75rem" onclick="adminApproveTx(${t.id})"><i class="fas fa-check"></i> Approve</button><button class="btn-outline" style="padding:6px 12px;font-size:0.75rem;color:var(--danger);border-color:var(--danger)" onclick="adminRejectTx(${t.id})"><i class="fas fa-times"></i> Reject</button></div></td></tr>`).join('')}</tbody></table></div>`}</div>`;
  }else{
    adminContent=`<div class="panel"><div class="panel-header"><h3 class="panel-title"><i class="fas fa-cog" style="margin-right:10px"></i>Platform Settings</h3></div><div class="form-group"><label>Platform Name</label><input type="text" value="UnionVest Capital" id="settingName"></div><div class="form-group"><label>Minimum Deposit ($)</label><input type="number" value="10" id="settingMinDeposit"></div><div class="form-group"><label>Minimum Withdrawal ($)</label><input type="number" value="50" id="settingMinWithdraw"></div><div class="form-group"><label>Referral Commission (%)</label><input type="number" value="10" id="settingReferral"></div><div class="form-group"><label>Card Processing Fee (%)</label><input type="number" value="2.5" id="settingCardFee"></div><div class="form-group"><label>PayPal Processing Fee (%)</label><input type="number" value="3.0" id="settingPaypalFee"></div><button class="btn-gold" onclick="addToast('Settings saved successfully','success')"><i class="fas fa-save" style="margin-right:8px"></i>Save Settings</button></div>`;
  }
  return `<div class="page"><div class="page-header"><h1>Admin Dashboard</h1><p>Manage users, approve transactions, and configure platform settings.</p></div><div class="stats-grid">${adminStats.map(s=>`<div class="stat-card"><div class="stat-icon" style="background:${s.color}20;color:${s.color}"><i class="fas ${s.icon}"></i></div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('')}</div><div class="wallet-tabs" style="margin-top:20px"><button class="wallet-tab ${adminTab==='users'?'active':''}" onclick="adminTab='users';render()"><i class="fas fa-users" style="margin-right:6px"></i>Users</button><button class="wallet-tab ${adminTab==='deposits'?'active':''}" onclick="adminTab='deposits';render()"><i class="fas fa-arrow-down" style="margin-right:6px"></i>Deposits</button><button class="wallet-tab ${adminTab==='withdrawals'?'active':''}" onclick="adminTab='withdrawals';render()"><i class="fas fa-arrow-up" style="margin-right:6px"></i>Withdrawals</button><button class="wallet-tab ${adminTab==='settings'?'active':''}" onclick="adminTab='settings';render()"><i class="fas fa-cog" style="margin-right:6px"></i>Settings</button></div>${adminContent}</div>`;
}

render();
</script>
</body>
</html>
